<!DOCTYPE html>
<html lang="en" dir="ltr" translate="no">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="background_color" content="#ffffff">
    <meta name="google" content="notranslate">
    <title>...</title>
    <link rel="canonical" href="https://dragonhtmil.github.io/mnts.memorycards.org/">
    <link rel="manifest" href="" id="manifestTestLoad">
    <link rel="stylesheet" href="index_data/styles/roots.css">
    <link rel="stylesheet" href="index_data/styles/styles.css">
    <link rel="stylesheet" href="index_data/styles/animations.css">
    <script>
      if(localStorage.getItem("lang") === "en") {
        document.documentElement.setAttribute("lang", "en");
      }else
      if(localStorage.getItem("lang") === "ru") {
        document.documentElement.setAttribute("lang", "ru");
      }else
      if(localStorage.getItem("lang") === "he") {
        document.documentElement.setAttribute("lang", "he");
      }
    </script>
  </head>
  <body>
    <div id="portraitOverlay">
      <p id="rotateAlertText">...</p>
    </div>
    <div class="space-bar"></div>
    <header class="header" id="header">
      <div class="device-info-indicator">
        <div id="batteryProgress">
          <div id="inBatteryProgress"></div>
        </div>
        <div id="dateTimeIndicator">
          <div id="clock">...</div>
          <div id="calendar">...</div>
        </div>
        <div id="batteryIndicator">
          <div id="batteryLevel"></div>
          <div id="batteryCharge"></div>
        </div>
      </div>
    </header>
    <div class="game-board" id="gameBoard"></div>
    <div class="smg-continer" id="smgContiner">
      <div id="message">...</div>
      <button id="resetBoardButton">...</button>
    </div>
    <div id="winModal" class="modal" style="display: none;">
      <div class="modal-content">
      <div id="noticeTitleLang">...</div>
        <button class="close-button" id="close" onclick="document.getElementById('winModal').style.display = 'none';"></button>
        <div class="in-modal-content" id="progressingALost">
          <div class="gettedscore" id="winScore">...</div>
        </div>
      </div>
    </div>
    <!-- Scripts -->
    <script src="index_data/scripts/system.js"></script>
    <script src="index_data/scripts/scripts.js"></script>
    <script src="index_data/scripts/languages_texts.js"></script>
    <script src="index_data/scripts/window_load.js"></script>
    <script>
      if(navigator.serviceWorker) {
        if(window.location.protocol === 'https:') {
          navigator.serviceWorker.register('/mnts.memorycards.org/sw.js',{scope: '/mnts.memorycards.org/'})
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(error => {
            return false
          });
          document.getElementById("manifestTestLoad").setAttribute('href','/mnts.memorycards.org/manifest.webmanifest');
        }else
        if (window.location.protocol === 'file:') {
          // Potentially register service worker for local file access (USE WITH CAUTION)
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' }) // Scope might need adjustment
              .then(registration => {
                console.log('Service Worker registered for local file with scope:', registration.scope);
              })
              .catch(error => {
                return false
              });
              document.getElementById("manifestTestLoad").setAttribute('href','./manifest.webmanifest');
          } else {
            console.log('Service workers are not supported in this environment.');
          }
        } else {
          console.log('Service workers are not being registered on non-HTTPS or non-file protocols.');
        }
      }
    </script>
    <div id="scriptContainer"></div>
  </body>
</html>
